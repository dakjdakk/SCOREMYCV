<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SQL Practice for Data Analysts | ScoreMyCV</title>
<meta name="description" content="Practice SQL with 200 real questions across 4 levels. Write actual queries, get instant feedback. Perfect for Data Analyst interview prep.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f8fafc;color:#1e293b;min-height:100vh}
a{color:inherit;text-decoration:none}

/* ── NAV ── */
nav{background:#fff;border-bottom:1px solid #e2e8f0;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 1px 3px rgba(0,0,0,.06);height:52px}
.logo{font-size:1.15rem;font-weight:800;color:#2563eb;cursor:pointer}
.logo:hover{opacity:.85}
.nav-cta{background:#2563eb;color:#fff;padding:8px 18px;border-radius:8px;font-size:.84rem;font-weight:700;cursor:pointer;border:none;animation:pulse-btn 2s ease-in-out infinite;box-shadow:0 0 0 0 rgba(37,99,235,.4)}
@keyframes pulse-btn{0%{box-shadow:0 0 0 0 rgba(37,99,235,.5)}70%{box-shadow:0 0 0 10px rgba(37,99,235,0)}100%{box-shadow:0 0 0 0 rgba(37,99,235,0)}}
.nav-cta:hover{background:#1d4ed8;animation:none}

/* ── HOME ── */
.hero{text-align:center;padding:52px 20px 36px;background:linear-gradient(135deg,#eff6ff 0%,#f8fafc 60%,#fef3c7 100%)}
.hero-tag{display:inline-block;background:#dbeafe;color:#1d4ed8;font-size:.74rem;font-weight:700;padding:4px 14px;border-radius:99px;margin-bottom:16px;letter-spacing:.05em;text-transform:uppercase}
.hero h1{font-size:clamp(1.8rem,4vw,2.7rem);font-weight:900;line-height:1.2;margin-bottom:12px;color:#0f172a}
.hero h1 .highlight{background:linear-gradient(90deg,#2563eb,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-sub{color:#475569;font-size:1rem;max-width:540px;margin:0 auto 8px;line-height:1.7}
.levels-section{max-width:960px;margin:0 auto;padding:24px 20px 16px}
.levels-section h2{font-size:.85rem;font-weight:700;color:#94a3b8;margin-bottom:14px;text-transform:uppercase;letter-spacing:.08em}
.levels{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:14px}
.level-card{background:#fff;border:2px solid #e2e8f0;border-radius:14px;padding:22px;cursor:pointer;transition:.2s;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.level-card:hover{transform:translateY(-3px);box-shadow:0 8px 20px rgba(0,0,0,.09)}
.level-icon{font-size:2rem;margin-bottom:9px}
.level-card h3{font-size:1rem;font-weight:800;margin-bottom:4px;color:#0f172a}
.level-card p{color:#64748b;font-size:.79rem;line-height:1.5}
.level-count{font-size:.74rem;font-weight:700;margin-top:9px}
.easy{border-top:4px solid #22c55e}.easy:hover{border-color:#22c55e;box-shadow:0 8px 20px rgba(34,197,94,.15)}.easy .level-count{color:#16a34a}
.medium{border-top:4px solid #f59e0b}.medium:hover{border-color:#f59e0b;box-shadow:0 8px 20px rgba(245,158,11,.15)}.medium .level-count{color:#d97706}
.intermediate{border-top:4px solid #f97316}.intermediate:hover{border-color:#f97316;box-shadow:0 8px 20px rgba(249,115,22,.15)}.intermediate .level-count{color:#ea580c}
.complex{border-top:4px solid #8b5cf6}.complex:hover{border-color:#8b5cf6;box-shadow:0 8px 20px rgba(139,92,246,.15)}.complex .level-count{color:#7c3aed}
.home-cta{max-width:960px;margin:8px auto 40px;padding:0 20px}
.cta-banner{background:linear-gradient(135deg,#eff6ff,#fff);border:1.5px solid #bfdbfe;border-radius:14px;padding:24px;text-align:center;box-shadow:0 2px 8px rgba(37,99,235,.08)}
.cta-banner h3{font-size:1rem;font-weight:800;margin-bottom:5px;color:#1e293b}
.cta-banner p{color:#64748b;font-size:.83rem;margin-bottom:14px}
.cta-btn{display:inline-block;background:#2563eb;color:#fff;padding:10px 28px;border-radius:8px;font-weight:800;font-size:.88rem;cursor:pointer;border:none;animation:pulse-btn 2s ease-in-out infinite;box-shadow:0 4px 14px rgba(37,99,235,.3)}
.cta-btn:hover{background:#1d4ed8;animation:none}

/* ── SPLIT PANEL QUESTION VIEW ── */
.q-topbar{display:flex;align-items:center;gap:10px;padding:8px 16px;background:#fff;border-bottom:1px solid #e2e8f0;height:46px;position:sticky;top:52px;z-index:50}
.q-back{background:#f1f5f9;border:1px solid #e2e8f0;color:#475569;padding:5px 12px;border-radius:6px;cursor:pointer;font-size:.8rem;font-weight:600;transition:.15s;white-space:nowrap}
.q-back:hover{background:#e2e8f0;color:#1e293b}
.q-topbar-center{display:flex;align-items:center;gap:8px;flex:1;justify-content:center}
.q-nav-btn{background:#f1f5f9;border:1px solid #e2e8f0;color:#475569;width:28px;height:28px;border-radius:6px;cursor:pointer;font-size:1rem;font-weight:700;display:flex;align-items:center;justify-content:center;transition:.15s}
.q-nav-btn:hover:not(:disabled){background:#e2e8f0}
.q-nav-btn:disabled{opacity:.35;cursor:not-allowed}
.q-counter{font-size:.82rem;font-weight:700;color:#1e293b;min-width:56px;text-align:center}
.q-progress{flex:1;max-width:160px;background:#e2e8f0;border-radius:99px;height:6px;overflow:hidden}
.q-progress-fill{height:100%;border-radius:99px;transition:.3s}
.score-pill{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:99px;padding:4px 12px;font-size:.78rem;font-weight:700;color:#16a34a;white-space:nowrap}

/* Two-panel layout */
.q-layout{display:flex;height:calc(100vh - 98px);overflow:hidden}

/* LEFT — description + tables */
.q-left{width:42%;min-width:280px;border-right:1px solid #e2e8f0;overflow-y:auto;background:#fff;display:flex;flex-direction:column}
.q-left-body{padding:20px;flex:1}
.diff-tag{display:inline-block;font-size:.7rem;font-weight:700;padding:3px 10px;border-radius:99px;text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px}
.q-title{font-size:1.05rem;font-weight:800;color:#0f172a;margin-bottom:10px;line-height:1.45}
.q-desc{color:#475569;font-size:.87rem;line-height:1.7;margin-bottom:14px}
.q-hint{background:#fefce8;border:1px solid #fde68a;border-radius:8px;padding:9px 13px;font-size:.8rem;color:#78350f;margin-bottom:18px}
.q-hint strong{color:#b45309}
.tbl-section-label{font-size:.7rem;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.tbl-tabs{display:flex;border-bottom:1px solid #e2e8f0;background:#f8fafc}
.tbl-tab{padding:6px 13px;font-size:.76rem;font-weight:700;color:#64748b;cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;margin-bottom:-1px;transition:.15s;white-space:nowrap}
.tbl-tab:hover{color:#2563eb}
.tbl-tab.active{color:#2563eb;border-bottom-color:#2563eb;background:#fff}
.tbl-tab-content{overflow-x:auto;overflow-y:auto;max-height:320px}
.mini-table{width:100%;border-collapse:collapse;font-size:.75rem}
.mini-table th{background:#f8fafc;padding:6px 10px;text-align:left;color:#475569;font-weight:700;border-bottom:1px solid #e2e8f0;position:sticky;top:0}
.mini-table td{padding:5px 10px;border-bottom:1px solid #f1f5f9;color:#334155}
.mini-table tr:last-child td{border-bottom:none}
.mini-table tr:hover td{background:#f8fafc}

/* RIGHT — editor + results */
.q-right{flex:1;display:flex;flex-direction:column;overflow:hidden;background:#fafafa}
.editor-bar{padding:8px 14px;background:#fff;border-bottom:1px solid #e2e8f0;font-size:.72rem;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.06em}
.sql-editor{flex:1;width:100%;resize:none;border:none;border-bottom:1px solid #e2e8f0;padding:14px 16px;font-family:'Courier New',Consolas,monospace;font-size:.9rem;color:#0f172a;outline:none;line-height:1.6;background:#fff;min-height:0}
.sql-editor:focus{background:#fffbeb}
.btn-bar{display:flex;gap:8px;padding:10px 14px;background:#fff;border-top:1px solid #e2e8f0;flex-shrink:0;flex-wrap:wrap}
.btn{padding:8px 18px;border-radius:7px;font-size:.84rem;font-weight:700;cursor:pointer;border:none;transition:.15s}
.btn-run{background:#2563eb;color:#fff}
.btn-run:hover{background:#1d4ed8}
.btn-answer{background:#fff;border:1.5px solid #e2e8f0;color:#475569}
.btn-answer:hover{background:#f8fafc}
.btn-next{background:#16a34a;color:#fff}
.btn-next:hover{background:#15803d}
.result-area{overflow-y:auto;overflow-x:auto;padding:12px 14px;flex:1;min-height:0}
.feedback{border-radius:8px;padding:10px 14px;font-size:.84rem;line-height:1.6}
.feedback.correct{background:#f0fdf4;border:1px solid #86efac;color:#14532d}
.feedback.wrong{background:#fef2f2;border:1px solid #fca5a5;color:#7f1d1d}
.feedback.info{background:#f8fafc;border:1px solid #e2e8f0;color:#475569}
.result-wrap{overflow-x:auto;margin-top:10px}
.result-table{border-collapse:collapse;width:100%;font-size:.78rem}
.result-table th{background:#f1f5f9;padding:6px 10px;text-align:left;color:#2563eb;font-weight:700;border-bottom:2px solid #e2e8f0}
.result-table td{padding:5px 10px;border-bottom:1px solid #f1f5f9;color:#334155}
.result-table tr:hover td{background:#f8fafc}
.result-table tr:last-child td{border-bottom:none}

/* loading */
#loading{text-align:center;padding:80px 20px}
#loading .spinner{width:40px;height:40px;border:3px solid #e2e8f0;border-top-color:#2563eb;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}

/* completion */
.completion-card{background:#fff;border:1px solid #e2e8f0;border-radius:20px;padding:36px;max-width:500px;margin:40px auto;box-shadow:0 4px 20px rgba(0,0,0,.06);text-align:center}
.completion-emoji{font-size:3.2rem;margin-bottom:12px}
.completion-card h2{font-size:1.4rem;font-weight:900;margin-bottom:8px;color:#0f172a}
.completion-card p{color:#64748b;margin-bottom:16px;font-size:.9rem}
.score-big{font-size:2.6rem;font-weight:900;color:#16a34a;margin:14px 0}

/* mobile toggle hidden on desktop */
.mobile-tbl-toggle{display:none}
.tbl-collapsible{display:none}

/* ── MOBILE ── */
@media(max-width:700px){
  #tbl-desktop,#tbl-desktop-label{display:none}
  .mobile-tbl-toggle{display:flex}

  /* Nav */
  nav{padding:10px 14px;height:48px}
  .logo{font-size:1rem}
  .nav-cta{padding:6px 11px;font-size:.76rem;white-space:nowrap}

  /* Home hero */
  .hero{padding:32px 16px 24px}
  .hero h1{font-size:1.55rem}
  .hero-sub{font-size:.88rem}
  .levels-section{padding:20px 14px 12px}
  .levels{grid-template-columns:1fr 1fr;gap:10px}
  .level-card{padding:16px 10px}
  .level-icon{font-size:1.6rem;margin-bottom:6px}
  .level-card h3{font-size:.9rem}
  .level-card p{font-size:.74rem}
  .home-cta{padding:0 14px;margin-bottom:32px}
  .cta-banner{padding:18px 16px}
  .cta-banner h3{font-size:.9rem}
  .cta-btn{padding:10px 20px;font-size:.84rem}

  /* Topbar */
  .q-topbar{padding:6px 12px;height:42px;top:48px;gap:6px}
  .q-back{font-size:.74rem;padding:4px 10px}
  .q-progress{display:none}
  .q-counter{font-size:.76rem;min-width:44px}
  .q-nav-btn{width:26px;height:26px;font-size:.9rem}
  .score-pill{font-size:.72rem;padding:3px 9px}

  /* Stack panels vertically, full-page scroll */
  .q-layout{flex-direction:column;height:auto;overflow:visible}

  /* Left panel */
  .q-left{width:100%;min-width:0;border-right:none;border-bottom:2px solid #e2e8f0;overflow:visible}
  .q-left-body{padding:14px 14px 0}
  .diff-tag{font-size:.66rem;padding:2px 9px;margin-bottom:10px}
  .q-title{font-size:.95rem;margin-bottom:8px}
  .q-desc{font-size:.82rem;margin-bottom:10px}
  .q-hint{font-size:.78rem;padding:8px 11px;margin-bottom:12px}
  .tbl-section-label{font-size:.65rem;margin-bottom:6px}

  /* Tables collapsible toggle on mobile */
  .mobile-tbl-toggle{display:flex;align-items:center;justify-content:space-between;background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:9px 13px;cursor:pointer;margin-bottom:0;font-size:.8rem;font-weight:700;color:#475569;-webkit-tap-highlight-color:transparent}
  .mobile-tbl-toggle .arrow{transition:.2s;font-size:.7rem}
  .mobile-tbl-toggle.open .arrow{transform:rotate(180deg)}
  .tbl-collapsible{display:none;border:1px solid #e2e8f0;border-top:none;border-radius:0 0 8px 8px;margin-bottom:14px;overflow:hidden}
  .tbl-collapsible.open{display:block}
  .tbl-tab-content{max-height:170px}
  .mini-table{font-size:.7rem}
  .mini-table th,.mini-table td{padding:4px 8px;white-space:nowrap}

  /* Right panel — flows below left */
  .q-right{flex:none;height:auto;overflow:visible}
  .editor-bar{padding:6px 12px;font-size:.68rem}
  .sql-editor{height:130px;min-height:0;flex:none;font-size:.85rem;resize:none}
  .btn-bar{padding:8px 12px;gap:6px}
  .btn{padding:10px 0;font-size:.82rem;flex:1;text-align:center}
  .result-area{flex:none;overflow:visible;padding:10px 12px;min-height:60px}
  .feedback{font-size:.8rem}
  .result-table{font-size:.73rem}
  .result-table th,.result-table td{padding:5px 8px}
}

@media(max-width:380px){
  .levels{grid-template-columns:1fr}
  .nav-cta{font-size:.7rem;padding:5px 9px}
  .q-back span{display:none}
}
</style>
</head>
<body>
<nav>
  <div class="logo">📄ScoreMyCV</div>
  <button class="nav-cta" onclick="openCTA()">🚀 Get My CV Reviewed – ₹99</button>
</nav>

<div id="app">
  <div id="loading">
    <div class="spinner"></div>
    <p>Loading SQL engine…</p>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/sql-wasm.js"></script>
<script>
// ─── DATABASE SETUP ──────────────────────────────────────────────
const SETUP = `

INSERT INTO orders VALUES

const SCHEMA_HTML = `<span class="tbl">employees</span>(<span class="col">id, name, department, salary, hire_year, age, city, manager_id</span>)<br>
<span class="tbl">departments</span>(<span class="col">id, name, budget, location</span>)<br>
<span class="tbl">products</span>(<span class="col">id, name, category, price, stock</span>)<br>
<span class="tbl">orders</span>(<span class="col">id, product_id, customer_name, qty, amount, order_date, status</span>)`;

// ─── QUESTIONS ───────────────────────────────────────────────────
const QUESTIONS = {
easy: [
["Select all employees","Fetch every row and column from the employees table.","Use SELECT * to get all columns","SELECT * FROM employees"],
["Select all products","Fetch every row and column from the products table.","Use SELECT * FROM table_name","SELECT * FROM products"],
["Select all orders","Fetch every row and column from the orders table.","Use SELECT * FROM table_name","SELECT * FROM orders"],
["Select all departments","Fetch every row and column from the departments table.","Use SELECT * FROM table_name","SELECT * FROM departments"],
["Show only employee names","Display just the name column from the employees table.","SELECT column FROM table","SELECT name FROM employees"],
["Show product names and prices","Display the name and price columns from the products table.","SELECT col1, col2 FROM table","SELECT name, price FROM products"],
["Show employee name, department, salary","Display only these three columns for all employees.","List the columns separated by commas","SELECT name, department, salary FROM employees"],
["Show order customer and amount","Display only customer_name and amount from the orders table.","SELECT col1, col2 FROM table","SELECT customer_name, amount FROM orders"],
["Count total employees","How many employees are in the company?","Use COUNT(*) and alias it as total","SELECT COUNT(*) AS total FROM employees"],
["Count total products","How many products does the company sell?","Use COUNT(*)","SELECT COUNT(*) AS total FROM products"],
["Count total orders","How many orders have been placed?","Use COUNT(*)","SELECT COUNT(*) AS total FROM orders"],
["Find the highest salary","What is the maximum salary in the company?","Use MAX() aggregate function","SELECT MAX(salary) AS max_salary FROM employees"],
["Find the lowest salary","What is the minimum salary in the company?","Use MIN() aggregate function","SELECT MIN(salary) AS min_salary FROM employees"],
["Find average salary","What is the average salary across all employees?","Use AVG() aggregate function","SELECT AVG(salary) AS avg_salary FROM employees"],
["Find total salary payout","What is the sum of all employee salaries combined?","Use SUM() aggregate function","SELECT SUM(salary) AS total_salary FROM employees"],
["Find the most expensive product","What is the highest price among all products?","Use MAX() on the price column","SELECT MAX(price) AS max_price FROM products"],
["Find the cheapest product price","What is the lowest price among all products?","Use MIN() on the price column","SELECT MIN(price) AS min_price FROM products"],
["Find all Engineering employees","Show all employees who work in the Engineering department.","Use WHERE department = 'value'","SELECT * FROM employees WHERE department = 'Engineering'"],
["Find all HR employees","Show all employees who work in the HR department.","Use WHERE with string comparison","SELECT * FROM employees WHERE department = 'HR'"],
["Find employees in Bangalore","Show all employees living in Bangalore.","Use WHERE city = 'value'","SELECT * FROM employees WHERE city = 'Bangalore'"],
["Find employees earning above 80000","Show employees with salary greater than 80000.","Use WHERE salary > value","SELECT * FROM employees WHERE salary > 80000"],
["Find employees earning below 65000","Show employees with salary less than 65000.","Use WHERE salary < value","SELECT * FROM employees WHERE salary < 65000"],
["Find employees hired in 2020","Show all employees who joined in 2020.","Use WHERE hire_year = value","SELECT * FROM employees WHERE hire_year = 2020"],
["Find employees hired after 2020","Show employees who joined after the year 2020.","Use WHERE hire_year > 2020","SELECT * FROM employees WHERE hire_year > 2020"],
["Find employees older than 30","Show employees whose age is greater than 30.","Use WHERE age > value","SELECT * FROM employees WHERE age > 30"],
["Find employees aged exactly 28","Show all employees who are exactly 28 years old.","Use WHERE age = value","SELECT * FROM employees WHERE age = 28"],
["Find Delivered orders","Show all orders with status 'Delivered'.","Use WHERE status = 'value'","SELECT * FROM orders WHERE status = 'Delivered'"],
["Find Pending orders","Show all orders with status 'Pending'.","Use WHERE with exact string match","SELECT * FROM orders WHERE status = 'Pending'"],
["Find orders above 50000","Show orders where the amount is greater than 50000.","Use WHERE amount > value","SELECT * FROM orders WHERE amount > 50000"],
["Salary between 70000 and 90000","Find employees earning between 70000 and 90000 (both inclusive).","Use BETWEEN value1 AND value2","SELECT * FROM employees WHERE salary BETWEEN 70000 AND 90000"],
["Employees in Engineering or Finance","Show employees from either Engineering or Finance department.","Use IN ('val1','val2') or use OR","SELECT * FROM employees WHERE department IN ('Engineering','Finance')"],
["Employees NOT in HR","Show all employees who are NOT in the HR department.","Use != or NOT IN","SELECT * FROM employees WHERE department != 'HR'"],

complex: [
["Rank employees by salary (RANK)","Assign a salary rank to each employee — highest salary gets rank 1. Ties get the same rank.","RANK() OVER (ORDER BY salary DESC)","SELECT name, salary, RANK() OVER (ORDER BY salary DESC) AS rank FROM employees"],
["Rank employees by salary (DENSE_RANK)","Assign salary rank using DENSE_RANK() — no gaps in rank numbers for ties.","DENSE_RANK() OVER (ORDER BY salary DESC)","SELECT name, salary, DENSE_RANK() OVER (ORDER BY salary DESC) AS dense_rank FROM employees"],
["Row number for each employee","Assign a unique sequential row number ordered by salary descending.","ROW_NUMBER() OVER (ORDER BY salary DESC)","SELECT name, salary, ROW_NUMBER() OVER (ORDER BY salary DESC) AS row_num FROM employees"],
["Rank employees within each department","Rank employees by salary within their own department (highest = rank 1 per dept).","PARTITION BY department in window function","SELECT name, department, salary, RANK() OVER (PARTITION BY department ORDER BY salary DESC) AS dept_rank FROM employees"],
["Running total of salary","Show each employee (ordered by id) with a cumulative running total of salaries.","SUM(salary) OVER (ORDER BY id)","SELECT name, salary, SUM(salary) OVER (ORDER BY id) AS running_total FROM employees"],
["Running average salary","Show each employee (ordered by id) with a running average salary up to that point.","AVG(salary) OVER (ORDER BY id)","SELECT name, salary, ROUND(AVG(salary) OVER (ORDER BY id), 0) AS running_avg FROM employees"],
["Next higher salary (LEAD)","For each employee sorted by salary descending, show the next salary value using LEAD.","LEAD(salary) OVER (ORDER BY salary DESC)","SELECT name, salary, LEAD(salary) OVER (ORDER BY salary DESC) AS next_salary FROM employees"],
["Previous lower salary (LAG)","For each employee sorted by salary ascending, show the previous salary using LAG.","LAG(salary) OVER (ORDER BY salary ASC)","SELECT name, salary, LAG(salary) OVER (ORDER BY salary ASC) AS prev_salary FROM employees"],
["Salary gap from previous (LAG)","For each employee sorted by salary ascending, show the gap from the one below them.","salary - LAG(salary) OVER (ORDER BY salary)","SELECT name, salary, salary - LAG(salary, 1, salary) OVER (ORDER BY salary) AS gap FROM employees ORDER BY salary"],
["Salary as percentage of total","Show each employee's salary as a % of the total company salary.","salary * 100.0 / SUM(salary) OVER ()","SELECT name, salary, ROUND(salary * 100.0 / SUM(salary) OVER (), 2) AS pct_of_total FROM employees"],
["Top earner in each department (FIRST_VALUE)","Show the name of the top earner in each department for every row.","FIRST_VALUE(name) OVER (PARTITION BY department ORDER BY salary DESC)","SELECT DISTINCT department, FIRST_VALUE(name) OVER (PARTITION BY department ORDER BY salary DESC) AS top_earner FROM employees"],
["Salary quartiles (NTILE)","Divide employees into 4 salary quartiles. 1 = lowest, 4 = highest.","NTILE(4) OVER (ORDER BY salary)","SELECT name, salary, NTILE(4) OVER (ORDER BY salary) AS quartile FROM employees"],
["Employees in the top salary quartile","Show only employees in the top 25% salary bracket (quartile 4).","Wrap NTILE in subquery, filter WHERE q = 4","SELECT name, salary FROM (SELECT name, salary, NTILE(4) OVER (ORDER BY salary) AS q FROM employees) WHERE q = 4"],
["Employees in the bottom salary quartile","Show only employees in the bottom 25% salary bracket (quartile 1).","Wrap NTILE, filter WHERE q = 1","SELECT name, salary FROM (SELECT name, salary, NTILE(4) OVER (ORDER BY salary) AS q FROM employees) WHERE q = 1"],
["Gap from department top earner","For each employee show how much below the top earner in their department they are.","MAX(salary) OVER (PARTITION BY department) - salary","SELECT name, department, salary, MAX(salary) OVER (PARTITION BY department) - salary AS gap_to_top FROM employees"],
["Each employee vs department average","Show each employee's salary alongside the average salary of their department.","AVG(salary) OVER (PARTITION BY department)","SELECT name, department, salary, ROUND(AVG(salary) OVER (PARTITION BY department), 0) AS dept_avg FROM employees"],
["Salary percentile rank","Show each employee's salary percentile rank (0.0 to 1.0) across the company.","PERCENT_RANK() OVER (ORDER BY salary)","SELECT name, salary, ROUND(PERCENT_RANK() OVER (ORDER BY salary), 2) AS percentile FROM employees"],
["Cumulative salary distribution","Show each employee and what fraction of the workforce earns ≤ their salary.","CUME_DIST() OVER (ORDER BY salary)","SELECT name, salary, ROUND(CUME_DIST() OVER (ORDER BY salary), 2) AS cume_dist FROM employees"],
["Top 2 earners per department","Show the top 2 highest-paid employees in each department.","ROW_NUMBER() OVER (PARTITION BY department ORDER BY salary DESC), filter rn <= 2","SELECT name, department, salary FROM (SELECT name, department, salary, ROW_NUMBER() OVER (PARTITION BY department ORDER BY salary DESC) AS rn FROM employees) WHERE rn <= 2"],
["Running count of employees by hire year","Show each employee with a running count of how many had been hired up to that year.","COUNT(*) OVER (ORDER BY hire_year, id)","SELECT name, hire_year, COUNT(*) OVER (ORDER BY hire_year, id) AS cumulative_hired FROM employees"],
["CTE: employees above average salary","Use a CTE to find employees earning above the company average.","WITH avg_sal AS (SELECT AVG(salary) AS avg FROM employees) SELECT ... WHERE salary > avg","WITH avg_sal AS (SELECT AVG(salary) AS avg FROM employees) SELECT e.name, e.salary FROM employees e, avg_sal WHERE e.salary > avg_sal.avg"],
["CTE: department salary summary","Use a CTE for department stats, then join back to employees.","WITH dept_stats AS (...) SELECT e.name, ds.avg_sal","WITH dept_stats AS (SELECT department, AVG(salary) AS avg_sal, MAX(salary) AS max_sal FROM employees GROUP BY department) SELECT e.name, e.department, e.salary, ROUND(ds.avg_sal,0) AS dept_avg FROM employees e JOIN dept_stats ds ON e.department = ds.department"],
["CTE: top earner per department","Use a CTE with RANK() to find the single top earner in each department.","WITH ranked AS (...RANK()...) SELECT WHERE rnk = 1","WITH ranked AS (SELECT name, department, salary, RANK() OVER (PARTITION BY department ORDER BY salary DESC) AS rnk FROM employees) SELECT name, department, salary FROM ranked WHERE rnk = 1"],
["CTE: rank departments by average salary","Use a CTE to calculate each department's average salary, then rank them.","WITH dept_avg AS (...) SELECT ..., RANK() OVER (ORDER BY avg_sal DESC)","WITH dept_avg AS (SELECT department, AVG(salary) AS avg_sal FROM employees GROUP BY department) SELECT department, ROUND(avg_sal,0) AS avg_sal, RANK() OVER (ORDER BY avg_sal DESC) AS rank FROM dept_avg"],
["CTE: order summary by product","Use a CTE to summarise orders per product, then join with products table.","WITH order_stats AS (...GROUP BY product_id) JOIN products","WITH order_stats AS (SELECT product_id, COUNT(*) AS times, SUM(amount) AS revenue FROM orders GROUP BY product_id) SELECT p.name, os.times, os.revenue FROM products p JOIN order_stats os ON p.id = os.product_id"],
["CTE: employees who ordered + their count","Use a CTE to get order counts, then LEFT JOIN with employees (show 0 for no orders).","WITH order_counts AS (...) SELECT e.name, COALESCE(oc.order_count, 0)","WITH order_counts AS (SELECT customer_name, COUNT(*) AS order_count FROM orders GROUP BY customer_name) SELECT e.name, COALESCE(oc.order_count, 0) AS orders FROM employees e LEFT JOIN order_counts oc ON e.name = oc.customer_name"],
["CTE: above-average employees per department","Use a CTE to find employees above company average, then count per department.","WITH above_avg AS (SELECT * WHERE salary > AVG subquery)","WITH above_avg AS (SELECT * FROM employees WHERE salary > (SELECT AVG(salary) FROM employees)) SELECT department, COUNT(*) AS count FROM above_avg GROUP BY department"],
["CTE: department salary % of company total","Use a CTE to find each department's total salary as % of company total.","WITH totals AS (...) SELECT department, pct","WITH totals AS (SELECT department, SUM(salary) AS dept_total FROM employees GROUP BY department) SELECT department, dept_total, ROUND(dept_total * 100.0 / (SELECT SUM(salary) FROM employees), 1) AS pct FROM totals"],
["Two CTEs: department stats + top earners","Use two CTEs — one for department stats, one for top earners — then join them.","WITH cte1 AS (...), cte2 AS (...) SELECT ...","WITH dept_stats AS (SELECT department, AVG(salary) AS avg_sal FROM employees GROUP BY department), top_earners AS (SELECT name, department, salary, ROW_NUMBER() OVER (PARTITION BY department ORDER BY salary DESC) AS rn FROM employees) SELECT te.name, te.department, te.salary, ROUND(ds.avg_sal,0) AS dept_avg FROM top_earners te JOIN dept_stats ds ON te.department = ds.department WHERE te.rn = 1"],
["CTE: full order enrichment","Use a CTE to build an enriched orders view — customer dept, product name, amount.","WITH order_details AS (JOIN orders+products) then JOIN employees","WITH order_details AS (SELECT o.customer_name, p.name AS product, p.category, o.amount, o.status FROM orders o JOIN products p ON o.product_id = p.id) SELECT od.customer_name, e.department, od.product, od.category, od.amount FROM order_details od JOIN employees e ON od.customer_name = e.name"],
["Moving average of order amounts","Show each order with a 3-row moving average (1 before + current + 1 after).","AVG(amount) OVER (ORDER BY id ROWS BETWEEN 1 PRECEDING AND 1 FOLLOWING)","SELECT customer_name, amount, ROUND(AVG(amount) OVER (ORDER BY id ROWS BETWEEN 1 PRECEDING AND 1 FOLLOWING), 0) AS moving_avg FROM orders"],
["Cumulative orders by date","Show total number of orders placed up to and including each date.","SUM(COUNT(*)) OVER (ORDER BY order_date)","SELECT order_date, COUNT(*) AS daily_orders, SUM(COUNT(*)) OVER (ORDER BY order_date) AS cumulative FROM orders GROUP BY order_date"],
["Running total of order revenue","Show each order with a running cumulative sum of amounts sorted by date.","SUM(amount) OVER (ORDER BY order_date, id)","SELECT order_date, customer_name, amount, SUM(amount) OVER (ORDER BY order_date, id) AS running_total FROM orders"],
["Salary gap between consecutive hires","For employees sorted by hire_year, show salary difference from the previous hire.","LAG to get previous hire salary, then subtract","SELECT name, hire_year, salary, salary - LAG(salary, 1, salary) OVER (ORDER BY hire_year, id) AS change_from_prev FROM employees ORDER BY hire_year, id"],
["First and last order per customer","For each order row, show the customer's first and last order date.","MIN/MAX OVER (PARTITION BY customer_name)","SELECT DISTINCT customer_name, MIN(order_date) OVER (PARTITION BY customer_name) AS first_order, MAX(order_date) OVER (PARTITION BY customer_name) AS last_order FROM orders"],
["Order rank within each status group","Rank orders by amount within each status group. Highest amount = rank 1.","RANK() OVER (PARTITION BY status ORDER BY amount DESC)","SELECT customer_name, status, amount, RANK() OVER (PARTITION BY status ORDER BY amount DESC) AS rank_in_status FROM orders"],
["Average amount by status group (window)","Show each order with the average amount for its status group alongside.","AVG(amount) OVER (PARTITION BY status)","SELECT customer_name, status, amount, ROUND(AVG(amount) OVER (PARTITION BY status), 0) AS avg_for_status FROM orders"],
["Salary percentile within department","Show each employee's salary percentile rank within their own department.","PERCENT_RANK() OVER (PARTITION BY department ORDER BY salary)","SELECT name, department, salary, ROUND(PERCENT_RANK() OVER (PARTITION BY department ORDER BY salary), 2) AS dept_percentile FROM employees"],
["Pivot: employee count per dept per city","Count employees in each department, grouped by city (pivot style).","SUM(CASE WHEN department='...' THEN 1 ELSE 0 END) for each dept","SELECT city, SUM(CASE WHEN department='Engineering' THEN 1 ELSE 0 END) AS Engineering, SUM(CASE WHEN department='Marketing' THEN 1 ELSE 0 END) AS Marketing, SUM(CASE WHEN department='HR' THEN 1 ELSE 0 END) AS HR, SUM(CASE WHEN department='Finance' THEN 1 ELSE 0 END) AS Finance FROM employees GROUP BY city"],
["Salary as % of department max","Show each employee's salary as % of the highest salary in their department.","salary * 100.0 / MAX(salary) OVER (PARTITION BY department)","SELECT name, department, salary, ROUND(salary * 100.0 / MAX(salary) OVER (PARTITION BY department), 1) AS pct_of_dept_max FROM employees"],
["CTE + window: full department dashboard","Build a department dashboard: headcount, avg salary, total salary, and rank by avg salary.","Multiple aggregates in CTE then RANK window","WITH dept_summary AS (SELECT department, COUNT(*) AS headcount, ROUND(AVG(salary),0) AS avg_sal, SUM(salary) AS total_sal, MAX(salary) AS max_sal FROM employees GROUP BY department) SELECT department, headcount, avg_sal, total_sal, max_sal, RANK() OVER (ORDER BY avg_sal DESC) AS avg_rank FROM dept_summary"],
["CTE: manager report counts","Use a CTE to show each manager's name and how many direct reports they have.","WITH report_counts AS (...GROUP BY manager_id) JOIN employees","WITH report_counts AS (SELECT manager_id, COUNT(*) AS reports FROM employees WHERE manager_id IS NOT NULL GROUP BY manager_id) SELECT e.name AS manager, rc.reports FROM employees e JOIN report_counts rc ON e.id = rc.manager_id ORDER BY rc.reports DESC"],
["Window: employees in same hire cohort","For each employee, show how many other employees were hired in the same year.","COUNT(*) OVER (PARTITION BY hire_year)","SELECT name, hire_year, COUNT(*) OVER (PARTITION BY hire_year) AS cohort_size FROM employees ORDER BY hire_year"],
["Window: order vs status average (Above/Below)","Show each order, its amount, and whether it is 'Above' or 'Below' average for its status group.","AVG OVER (PARTITION BY status) then CASE WHEN","SELECT customer_name, status, amount, ROUND(AVG(amount) OVER (PARTITION BY status),0) AS status_avg, CASE WHEN amount > AVG(amount) OVER (PARTITION BY status) THEN 'Above' ELSE 'Below' END AS vs_avg FROM orders"],
["CTE: product revenue ranking","Use a CTE to calculate total revenue per product, then rank by revenue.","WITH rev AS (...) SELECT name, revenue, RANK() OVER (ORDER BY revenue DESC)","WITH rev AS (SELECT p.name, SUM(o.amount) AS revenue FROM orders o JOIN products p ON o.product_id = p.id GROUP BY p.name) SELECT name, revenue, RANK() OVER (ORDER BY revenue DESC) AS revenue_rank FROM rev"],
["Window: flag large salary jumps","For employees sorted by salary, flag those with more than 5000 gap from the one below.","LAG + CASE WHEN gap > 5000","SELECT name, salary, salary - LAG(salary,1,salary) OVER (ORDER BY salary) AS increase, CASE WHEN salary - LAG(salary,1,salary) OVER (ORDER BY salary) > 5000 THEN 'Large jump' ELSE 'Small jump' END AS flag FROM employees ORDER BY salary"],
["CTE: employees below city median","Use NTILE to approximate city median salary, then find employees below it.","NTILE(2) OVER (PARTITION BY city ORDER BY salary), filter tile=1","WITH city_tiles AS (SELECT name, city, salary, NTILE(2) OVER (PARTITION BY city ORDER BY salary) AS tile FROM employees) SELECT name, city, salary FROM city_tiles WHERE tile = 1"],
["3-table join + window: order rank by dept","Show all orders with product name, customer's department, and rank within that dept.","JOIN orders+employees+products then RANK PARTITION BY department","SELECT o.customer_name, e.department, p.name AS product, o.amount, RANK() OVER (PARTITION BY e.department ORDER BY o.amount DESC) AS dept_order_rank FROM orders o JOIN employees e ON o.customer_name = e.name JOIN products p ON o.product_id = p.id"],
["CTE: top earner per dept with direct reports","Find the top earner in each department and show how many people report to them.","WITH dept_tops AS (...rn=1) LEFT JOIN report_counts","WITH dept_tops AS (SELECT name, department, salary, ROW_NUMBER() OVER (PARTITION BY department ORDER BY salary DESC) AS rn FROM employees), report_counts AS (SELECT manager_id, COUNT(*) AS reports FROM employees WHERE manager_id IS NOT NULL GROUP BY manager_id) SELECT dt.name, dt.department, dt.salary, COALESCE(rc.reports, 0) AS direct_reports FROM dept_tops dt LEFT JOIN employees em ON dt.name = em.name LEFT JOIN report_counts rc ON em.id = rc.manager_id WHERE dt.rn = 1"],
["Ultimate: department health report","Produce a full report: department total salary, headcount, average order spend, and rank by salary bill.","Multiple JOINs + GROUP BY + RANK window + CTE","WITH dept_data AS (SELECT e.department, COUNT(DISTINCT e.id) AS headcount, SUM(e.salary) AS salary_bill FROM employees e GROUP BY e.department), order_data AS (SELECT e.department, ROUND(AVG(o.amount),0) AS avg_order_spend FROM orders o JOIN employees e ON o.customer_name = e.name GROUP BY e.department) SELECT dd.department, dd.headcount, dd.salary_bill, COALESCE(od.avg_order_spend,0) AS avg_order_spend, RANK() OVER (ORDER BY dd.salary_bill DESC) AS salary_rank FROM dept_data dd LEFT JOIN order_data od ON dd.department = od.department"]
]
};

// ─── STATE ───────────────────────────────────────────────────────
let db, currentLevel = null, currentIdx = 0;
const results = {};

// ─── SQL ENGINE ──────────────────────────────────────────────────
function xq(sql) {
  try {
    var r = db.exec(sql.trim());
    return r.length ? {cols: r[0].columns, rows: r[0].values} : {cols:[], rows:[]};
  } catch(e) { return {error: e.message}; }
}
function norm(r) {
  return r.rows.map(function(row) {
    return row.map(function(v){ return v === null ? 'NULL' : String(v); }).join('\t');
  }).sort().join('\n');
}
function cmp(userSQL, expectedSQL) {
  var u = xq(userSQL);
  if (u.error) return {ok: false, error: u.error};
  var e = xq(expectedSQL);
  if (e.error) return {ok: false, error: 'System error'};
  return {ok: norm(u) === norm(e), u: u, e: e};
}

// ─── RENDER HELPERS ──────────────────────────────────────────────
function tableHTML(result) {
  if (!result || result.error) return '<p style="color:#dc2626;font-size:.82rem">Error: '+(result ? result.error : '')+'</p>';
  if (!result.rows || result.rows.length === 0) return '<p style="color:#94a3b8;font-size:.82rem">No rows returned.</p>';
  var h = '<div class="result-wrap"><table class="result-table"><thead><tr>';
  result.cols.forEach(function(c){ h += '<th>'+c+'</th>'; });
  h += '</tr></thead><tbody>';
  var limit = Math.min(result.rows.length, 15);
  for (var i = 0; i < limit; i++) {
    h += '<tr>';
    result.rows[i].forEach(function(v){ h += '<td>'+(v===null?'<em style="color:#94a3b8">NULL</em>':v)+'</td>'; });
    h += '</tr>';
  }
  if (result.rows.length > 15) h += '<tr><td colspan="'+result.cols.length+'" style="color:#94a3b8;font-style:italic">... '+(result.rows.length-15)+' more rows</td></tr>';
  h += '</tbody></table></div>';
  return h;
}
function score(level) {
  if (!results[level]) return {correct:0, total:0};
  var ks = Object.keys(results[level]);
  return {correct: ks.filter(function(k){ return results[level][k]==='correct'; }).length, total: ks.length};
}

// ─── LEVEL VIEW ──────────────────────────────────────────────────
function openLevel(level) {
  currentLevel = level;
  currentIdx = 0;
  renderLevel();
}

function buildTableTabs(prefix) {
  prefix = prefix || 'l';
  var tbls = ['employees','departments','products','orders'];
  var h = '<div class="tbl-tabs">';
  tbls.forEach(function(tbl, i) {
    h += '<button class="tbl-tab'+(i===0?' active':'')+'" onclick="switchTab(this,\''+prefix+'tab-'+tbl+'\')">' + tbl + '</button>';
  });
  h += '</div>';
  tbls.forEach(function(tbl, i) {
    var res = xq('SELECT * FROM ' + tbl);
    h += '<div class="tbl-tab-content" id="'+prefix+'tab-'+tbl+'"'+(i===0?'':' style="display:none"')+'>';
    if (res.error || !res.rows) { h += '<p style="color:#dc2626;padding:10px;font-size:.8rem">Error loading table</p>'; }
    else {
      h += '<table class="mini-table"><thead><tr>';
      res.cols.forEach(function(col){ h += '<th>'+col+'</th>'; });
      h += '</tr></thead><tbody>';
      res.rows.forEach(function(row) {
        h += '<tr>';
        row.forEach(function(v){ h += '<td>'+(v===null?'<em style="color:#94a3b8">NULL</em>':v)+'</td>'; });
        h += '</tr>';
      });
      h += '</tbody></table>';
    }
    h += '</div>';
  });
  return h;
}

function toggleMobileTbl(btn) {
  btn.classList.toggle('open');
  var panel = document.getElementById('tbl-mobile');
  panel.classList.toggle('open');
}

function isMobile() { return window.innerWidth <= 700; }

function renderLevel() {
  var qs = QUESTIONS[currentLevel];
  var colors = {easy:'#22c55e', medium:'#f59e0b', intermediate:'#f97316', complex:'#8b5cf6'};
  var tagBg  = {easy:'#dcfce7', medium:'#fef9c3', intermediate:'#ffedd5', complex:'#ede9fe'};
  var tagFg  = {easy:'#15803d', medium:'#b45309', intermediate:'#c2410c', complex:'#6d28d9'};
  var labels = {easy:'Easy', medium:'Medium', intermediate:'Intermediate', complex:'Complex'};
  var sc = score(currentLevel);
  var lvResults = results[currentLevel] || {};

  var q = qs[currentIdx];
  var pct = Math.round(((currentIdx+1)/qs.length)*100);
  var isLast = (currentIdx === qs.length - 1);
  var clr = colors[currentLevel];

  var savedResult = lvResults[currentIdx];
  var preFeedback = '';
  if (savedResult === 'correct') preFeedback = '<div class="feedback correct">✅ Correct! Your query produces the right result.</div>';
  else if (savedResult === 'wrong') preFeedback = '<div class="feedback wrong">❌ Not quite. Use the hint or click "Show Answer".</div>';

  var html = '';

  // ── Top bar ──
  html += '<div class="q-topbar">';
  html += '<button class="q-back" onclick="renderHome()">← Levels</button>';
  html += '<div class="q-topbar-center">';
  html += '<button class="q-nav-btn" onclick="goTo('+(currentIdx-1)+')"'+(currentIdx===0?' disabled':'')+'>‹</button>';
  html += '<span class="q-counter">'+(currentIdx+1)+' / '+qs.length+'</span>';
  html += '<button class="q-nav-btn" onclick="goTo('+(currentIdx+1)+')"'+(isLast?' disabled':'')+'>›</button>';
  html += '</div>';
  html += '<div class="q-progress"><div class="q-progress-fill" style="width:'+pct+'%;background:'+clr+'"></div></div>';
  html += '<div class="score-pill">✓ '+sc.correct+' / '+qs.length+'</div>';
  html += '</div>';

  // ── Two-panel layout ──
  html += '<div class="q-layout">';

  // LEFT panel
  html += '<div class="q-left">';
  html += '<div class="q-left-body">';
  html += '<span class="diff-tag" style="background:'+tagBg[currentLevel]+';color:'+tagFg[currentLevel]+'">'+labels[currentLevel]+'</span>';
  html += '<div class="q-title">'+q[0]+'</div>';
  html += '<div class="q-desc">'+q[1]+'</div>';
  html += '<div class="q-hint"><strong>💡 Hint:</strong> '+q[2]+'</div>';
  // On mobile: collapsible table section; on desktop: always visible
  html += '<div class="tbl-section-label" id="tbl-desktop-label">📋 Database Tables</div>';
  // Desktop table (hidden on mobile via CSS — shown inside .q-left-body directly)
  html += '<div id="tbl-desktop">' + buildTableTabs() + '</div>';
  // Mobile collapsible
  html += '<div class="mobile-tbl-toggle" onclick="toggleMobileTbl(this)" id="tbl-mobile-toggle">📋 View Database Tables <span class="arrow">▼</span></div>';
  html += '<div class="tbl-collapsible" id="tbl-mobile">' + buildTableTabs('m') + '</div>';
  html += '</div></div>';

  // RIGHT panel
  html += '<div class="q-right">';
  html += '<div class="editor-bar">SQL Editor &nbsp;·&nbsp; write your query below</div>';
  html += '<textarea class="sql-editor" id="sql-input" placeholder="SELECT ..." spellcheck="false"></textarea>';
  html += '<div class="btn-bar">';
  html += '<button class="btn btn-run" onclick="runQuery()">▶ Run Query</button>';
  html += '<button class="btn btn-answer" onclick="showAnswer()">Show Answer</button>';
  if (!isLast) {
    html += '<button class="btn btn-next" onclick="nextQ()">Next →</button>';
  } else {
    html += '<button class="btn btn-next" onclick="showCompletion()">Finish 🎉</button>';
  }
  html += '</div>';
  html += '<div class="result-area" id="result-area">';
  if (preFeedback) html += preFeedback;
  html += '</div>';
  html += '</div>';

  html += '</div>'; // .q-layout

  document.getElementById('app').innerHTML = html;
}

function switchTab(btn, targetId) {
  // Scope tab switching to the parent tbl-tabs container only
  var tabBar = btn.parentElement;
  tabBar.querySelectorAll('.tbl-tab').forEach(function(t){ t.classList.remove('active'); });
  btn.classList.add('active');
  // Hide all sibling tbl-tab-content panels (next siblings of tabBar's parent)
  var wrap = tabBar.parentElement;
  wrap.querySelectorAll('.tbl-tab-content').forEach(function(p){ p.style.display='none'; });
  document.getElementById(targetId).style.display = 'block';
}

function runQuery() {
function runQuery() {
  var userSQL = document.getElementById('sql-input').value.trim();
  if (!userSQL) return;
  var qs = QUESTIONS[currentLevel];
  var q = qs[currentIdx];
  var result = cmp(userSQL, q[3]);
  var html = '';
  if (result.error) {
    html = '<div class="feedback wrong">❌ Error: ' + result.error + '</div>';
  } else if (result.ok) {
    results[currentLevel] = results[currentLevel] || {};
    results[currentLevel][currentIdx] = 'correct';
    html = '<div class="feedback correct">✅ Correct! Your query matches the expected output.</div>';
    html += tableHTML(result.u);
    updateDot();
  } else {
    html = '<div class="feedback wrong">❌ Not quite. Check your output vs expected below.</div>';
    html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:8px">';
    html += '<div><p style="font-size:.75rem;font-weight:700;color:#64748b;margin-bottom:4px">YOUR OUTPUT</p>' + tableHTML(result.u) + '</div>';
    html += '<div><p style="font-size:.75rem;font-weight:700;color:#64748b;margin-bottom:4px">EXPECTED OUTPUT</p>' + tableHTML(result.e) + '</div>';
    html += '</div>';
  }
  document.getElementById('result-area').innerHTML = html;
}

function showAnswer() {
  var qs = QUESTIONS[currentLevel];
  var q = qs[currentIdx];
  document.getElementById('sql-input').value = q[3];
  runQuery();
}

function nextQ() {
  var qs = QUESTIONS[currentLevel];
  if (currentIdx < qs.length - 1) {
    currentIdx++;
    renderLevel();
  }
}

function showCompletion() {
  var sc = score(currentLevel);
  var labels = {easy:'Easy', medium:'Medium', intermediate:'Intermediate', complex:'Complex'};
  var html = '<div style="text-align:center;padding:60px 20px">';
  html += '<div style="font-size:3rem;margin-bottom:16px">🎉</div>';
  html += '<h2 style="font-size:1.8rem;font-weight:800;margin-bottom:8px">Level Complete!</h2>';
  html += '<p style="color:#64748b;margin-bottom:24px">You scored <strong>' + sc.correct + ' / ' + sc.total + '</strong> on ' + labels[currentLevel] + '</p>';
  html += '<button class="btn btn-run" onclick="renderHome()" style="margin:0 auto;display:inline-block">← Back to Levels</button>';
  html += '</div>';
  document.getElementById('app').innerHTML = html;
}

function toggleMobileTbl(btn) {
  var panel = document.getElementById('tbl-mobile');
  var isOpen = panel.style.display === 'block';
  panel.style.display = isOpen ? 'none' : 'block';
  btn.querySelector('.arrow').textContent = isOpen ? '▼' : '▲';
}

function updateDot() {
  var qs = QUESTIONS[currentLevel];
  var sc = score(currentLevel);
  var pill = document.querySelector('.score-pill');
  if (pill) pill.textContent = '✓ ' + sc.correct + ' / ' + qs.length;
}
