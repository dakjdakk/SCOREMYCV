name: Fetch Walk-in Jobs

on:
  schedule:
    # 6:30 AM IST = 1:00 AM UTC daily
    - cron: '0 1 * * *'
  workflow_dispatch:  # allows manual trigger

jobs:
  fetch-jobs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch walk-in jobs
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        run: python scripts/fetch_walkin_jobs.py

      - name: Commit updated jobs JSON
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/walkin-jobs.json
          git diff --cached --quiet || git commit -m "chore: update walk-in jobs $(date +'%Y-%m-%d')"
          git push
